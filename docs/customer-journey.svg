<svg width="1000" height="520" viewBox="0 0 1000 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5C6B7A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1000" height="520" fill="#FAFBFC"/>
  <text x="30" y="36" font-size="20" font-weight="700" fill="#0B1E3D">Customer Journey — Chat-First Servicing</text>

  <!-- Step 1 -->
  <rect x="30" y="70" width="170" height="86" rx="12" fill="#FFFFFF" stroke="#378ADD" stroke-width="1.5"/>
  <text x="115" y="98" font-size="13" font-weight="700" text-anchor="middle" fill="#0C447C">1. Entry</text>
  <text x="115" y="118" font-size="11" text-anchor="middle" fill="#5C6B7A">Opens WhatsApp</text>
  <text x="115" y="132" font-size="11" text-anchor="middle" fill="#5C6B7A">or PWA chat</text>

  <line x1="200" y1="113" x2="228" y2="113" stroke="#5C6B7A" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Step 2 -->
  <rect x="230" y="70" width="170" height="86" rx="12" fill="#FFFFFF" stroke="#F2A93B" stroke-width="1.5"/>
  <text x="315" y="98" font-size="13" font-weight="700" text-anchor="middle" fill="#D6902A">2. Authenticate</text>
  <text x="315" y="118" font-size="11" text-anchor="middle" fill="#5C6B7A">PNR + last name</text>
  <text x="315" y="132" font-size="11" text-anchor="middle" fill="#5C6B7A">(no password)</text>

  <line x1="400" y1="113" x2="428" y2="113" stroke="#5C6B7A" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Step 3 -->
  <rect x="430" y="70" width="170" height="86" rx="12" fill="#FFFFFF" stroke="#1FA97F" stroke-width="1.5"/>
  <text x="515" y="98" font-size="13" font-weight="700" text-anchor="middle" fill="#085041">3. Menu</text>
  <text x="515" y="118" font-size="11" text-anchor="middle" fill="#5C6B7A">Bot greets by name,</text>
  <text x="515" y="132" font-size="11" text-anchor="middle" fill="#5C6B7A">shows quick actions</text>

  <line x1="515" y1="156" x2="515" y2="186" stroke="#5C6B7A" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Branch box -->
  <rect x="60" y="188" width="880" height="130" rx="12" fill="#F4F1EA" stroke="#B4B2A9" stroke-width="1"/>
  <text x="80" y="210" font-size="12.5" font-weight="700" fill="#444441">4. Journey (self-serve in chat)</text>

  <rect x="80" y="222" width="150" height="80" rx="10" fill="#FFFFFF" stroke="#B4B2A9"/>
  <text x="155" y="248" font-size="12" font-weight="700" text-anchor="middle" fill="#2C2C2A">Flight status</text>
  <text x="155" y="266" font-size="10.5" text-anchor="middle" fill="#5C6B7A">Gate, delay,</text>
  <text x="155" y="280" font-size="10.5" text-anchor="middle" fill="#5C6B7A">terminal</text>

  <rect x="248" y="222" width="150" height="80" rx="10" fill="#FFFFFF" stroke="#B4B2A9"/>
  <text x="323" y="248" font-size="12" font-weight="700" text-anchor="middle" fill="#2C2C2A">Check-in</text>
  <text x="323" y="266" font-size="10.5" text-anchor="middle" fill="#5C6B7A">Pick passenger,</text>
  <text x="323" y="280" font-size="10.5" text-anchor="middle" fill="#5C6B7A">seat, boarding pass</text>

  <rect x="416" y="222" width="150" height="80" rx="10" fill="#FFFFFF" stroke="#B4B2A9"/>
  <text x="491" y="248" font-size="12" font-weight="700" text-anchor="middle" fill="#2C2C2A">Baggage</text>
  <text x="491" y="266" font-size="10.5" text-anchor="middle" fill="#5C6B7A">Add extra kg,</text>
  <text x="491" y="280" font-size="10.5" text-anchor="middle" fill="#5C6B7A">simulated payment</text>

  <rect x="584" y="222" width="150" height="80" rx="10" fill="#FFFFFF" stroke="#E5573F"/>
  <text x="659" y="248" font-size="12" font-weight="700" text-anchor="middle" fill="#993C1D">Cancellation</text>
  <text x="659" y="266" font-size="10.5" text-anchor="middle" fill="#5C6B7A">Refund quote +</text>
  <text x="659" y="280" font-size="10.5" text-anchor="middle" fill="#5C6B7A">OTP step-up auth</text>

  <rect x="752" y="222" width="150" height="80" rx="10" fill="#FFFFFF" stroke="#B4B2A9"/>
  <text x="827" y="248" font-size="12" font-weight="700" text-anchor="middle" fill="#2C2C2A">Talk to agent</text>
  <text x="827" y="266" font-size="10.5" text-anchor="middle" fill="#5C6B7A">On request or</text>
  <text x="827" y="280" font-size="10.5" text-anchor="middle" fill="#5C6B7A">2 failed intents</text>

  <line x1="500" y1="318" x2="500" y2="348" stroke="#5C6B7A" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Step 5 -->
  <rect x="330" y="350" width="340" height="60" rx="12" fill="#0B1E3D"/>
  <text x="500" y="376" font-size="13" font-weight="700" text-anchor="middle" fill="#FFFFFF">5. Confirmation</text>
  <text x="500" y="396" font-size="11" text-anchor="middle" fill="#B9C4D6">Ticket-style card in chat + optional email/WhatsApp receipt</text>

  <line x1="500" y1="410" x2="500" y2="440" stroke="#5C6B7A" stroke-width="1.5" marker-end="url(#arrow2)"/>

  <!-- Step 6 -->
  <rect x="330" y="442" width="340" height="60" rx="12" fill="#FFFFFF" stroke="#1FA97F" stroke-width="1.5"/>
  <text x="500" y="468" font-size="13" font-weight="700" text-anchor="middle" fill="#085041">6. Return to menu / end chat</text>
  <text x="500" y="488" font-size="11" text-anchor="middle" fill="#5C6B7A">Session stays authenticated for follow-up asks</text>
</svg>
