<svg width="1000" height="640" viewBox="0 0 1000 640" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5C6B7A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect width="1000" height="640" fill="#FAFBFC"/>

  <text x="30" y="36" font-size="20" font-weight="700" fill="#0B1E3D">BlueWings Conversational Booking &amp; Servicing — Architecture</text>

  <!-- Channels layer -->
  <g>
    <rect x="30" y="66" width="940" height="80" rx="12" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
    <text x="46" y="88" font-size="13" font-weight="700" fill="#0C447C">Channels</text>
    <rect x="46" y="98" width="200" height="36" rx="8" fill="#FFFFFF" stroke="#378ADD"/>
    <text x="146" y="121" font-size="12.5" text-anchor="middle" fill="#0C447C">WhatsApp Business API</text>
    <rect x="266" y="98" width="200" height="36" rx="8" fill="#FFFFFF" stroke="#378ADD"/>
    <text x="366" y="121" font-size="12.5" text-anchor="middle" fill="#0C447C">Progressive Web App (chat)</text>
    <rect x="486" y="98" width="200" height="36" rx="8" fill="#FFFFFF" stroke="#378ADD"/>
    <text x="586" y="121" font-size="12.5" text-anchor="middle" fill="#0C447C">Website chat widget</text>
    <rect x="706" y="98" width="244" height="36" rx="8" fill="#FFFFFF" stroke="#378ADD"/>
    <text x="828" y="121" font-size="12.5" text-anchor="middle" fill="#0C447C">Contact-centre agent desktop</text>
  </g>

  <line x1="500" y1="146" x2="500" y2="176" stroke="#5C6B7A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Gateway -->
  <g>
    <rect x="330" y="178" width="340" height="46" rx="10" fill="#0B1E3D"/>
    <text x="500" y="206" font-size="13.5" font-weight="700" text-anchor="middle" fill="#FFFFFF">Conversation Gateway (Express API · /api/chat)</text>
  </g>

  <line x1="500" y1="224" x2="500" y2="254" stroke="#5C6B7A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Core engine layer -->
  <g>
    <rect x="30" y="256" width="940" height="150" rx="12" fill="#FDECE9" stroke="#E5573F" stroke-width="1"/>
    <text x="46" y="278" font-size="13" font-weight="700" fill="#993C1D">Conversational Engine</text>

    <rect x="60" y="290" width="200" height="96" rx="10" fill="#FFFFFF" stroke="#E5573F"/>
    <text x="160" y="314" font-size="12.5" font-weight="700" text-anchor="middle" fill="#993C1D">Session Manager</text>
    <text x="160" y="332" font-size="11" text-anchor="middle" fill="#5C6B7A">Auth state,</text>
    <text x="160" y="346" font-size="11" text-anchor="middle" fill="#5C6B7A">context, PNR</text>
    <text x="160" y="360" font-size="11" text-anchor="middle" fill="#5C6B7A">binding</text>

    <rect x="284" y="290" width="200" height="96" rx="10" fill="#FFFFFF" stroke="#E5573F"/>
    <text x="384" y="314" font-size="12.5" font-weight="700" text-anchor="middle" fill="#993C1D">Intent Engine (NLU)</text>
    <text x="384" y="332" font-size="11" text-anchor="middle" fill="#5C6B7A">Classifies message</text>
    <text x="384" y="346" font-size="11" text-anchor="middle" fill="#5C6B7A">-&gt; intent + entities</text>
    <text x="384" y="360" font-size="11" text-anchor="middle" fill="#5C6B7A">(PNR, seat, dates)</text>

    <rect x="508" y="290" width="200" height="96" rx="10" fill="#FFFFFF" stroke="#E5573F"/>
    <text x="608" y="314" font-size="12.5" font-weight="700" text-anchor="middle" fill="#993C1D">Dialogue Manager</text>
    <text x="608" y="332" font-size="11" text-anchor="middle" fill="#5C6B7A">Journey state machine,</text>
    <text x="608" y="346" font-size="11" text-anchor="middle" fill="#5C6B7A">step-up auth,</text>
    <text x="608" y="360" font-size="11" text-anchor="middle" fill="#5C6B7A">escalation rules</text>

    <rect x="732" y="290" width="200" height="96" rx="10" fill="#FFFFFF" stroke="#E5573F"/>
    <text x="832" y="314" font-size="12.5" font-weight="700" text-anchor="middle" fill="#993C1D">Agent Handoff</text>
    <text x="832" y="332" font-size="11" text-anchor="middle" fill="#5C6B7A">Escalation trigger +</text>
    <text x="832" y="346" font-size="11" text-anchor="middle" fill="#5C6B7A">context transfer to</text>
    <text x="832" y="360" font-size="11" text-anchor="middle" fill="#5C6B7A">live agent</text>
  </g>

  <line x1="500" y1="406" x2="500" y2="436" stroke="#5C6B7A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Services layer -->
  <g>
    <rect x="30" y="438" width="940" height="90" rx="12" fill="#E5F6F0" stroke="#1FA97F" stroke-width="1"/>
    <text x="46" y="460" font-size="13" font-weight="700" fill="#085041">Booking Service Layer</text>
    <rect x="60" y="470" width="180" height="42" rx="8" fill="#FFFFFF" stroke="#1FA97F"/>
    <text x="150" y="496" font-size="12" text-anchor="middle" fill="#085041">PNR / Booking retrieval</text>
    <rect x="256" y="470" width="180" height="42" rx="8" fill="#FFFFFF" stroke="#1FA97F"/>
    <text x="346" y="496" font-size="12" text-anchor="middle" fill="#085041">Check-in &amp; seat selection</text>
    <rect x="452" y="470" width="180" height="42" rx="8" fill="#FFFFFF" stroke="#1FA97F"/>
    <text x="542" y="496" font-size="12" text-anchor="middle" fill="#085041">Cancellation &amp; refund</text>
    <rect x="648" y="470" width="150" height="42" rx="8" fill="#FFFFFF" stroke="#1FA97F"/>
    <text x="723" y="496" font-size="12" text-anchor="middle" fill="#085041">Baggage add-on</text>
    <rect x="814" y="470" width="132" height="42" rx="8" fill="#FFFFFF" stroke="#1FA97F"/>
    <text x="880" y="496" font-size="12" text-anchor="middle" fill="#085041">OTP / step-up auth</text>
  </g>

  <line x1="500" y1="528" x2="500" y2="558" stroke="#5C6B7A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Backend integration layer -->
  <g>
    <rect x="30" y="560" width="940" height="60" rx="12" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
    <text x="46" y="582" font-size="13" font-weight="700" fill="#444441">Airline Backend (mocked for MVP — real integration points)</text>
    <text x="46" y="602" font-size="11.5" fill="#5C6B7A">PSS / PNR service&#160;&#160;·&#160;&#160;DCS (check-in &amp; seat inventory)&#160;&#160;·&#160;&#160;Payment gateway (simulated)&#160;&#160;·&#160;&#160;Flight-status feed&#160;&#160;·&#160;&#160;CRM / agent desktop (handoff)</text>
  </g>
</svg>
